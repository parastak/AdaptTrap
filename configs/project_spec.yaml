project:
  name: AdaptTrap
  version: "3.1"
  status: benchmark_core_frozen
  description: >
    Adaptive cyber deception benchmark with a custom multi-head
    actor-critic defender and three attacker tiers.

benchmark_core:
  frozen: true
  includes:
    - live_local_env
    - service_simulator
    - identity_profiles
    - attacker_tiers_1_to_3
    - custom_actor_critic_defender
    - curriculum_training
  excludes:
    - sqlite_memory
    - stix_export
    - llm_realism
    - final_dashboard

defender:
  algorithm:
    name: custom_actor_critic
    advantage_estimator: gae
    library: custom_pytorch
    rejected_alternatives:
      - ppo_sb3
      - generic_off_the_shelf_rl
  architecture:
    state_dim: 12
    shared_trunk: true
    attacker_specific_policy_heads: 3
    attacker_specific_value_heads: 3
    attacker_order:
      - recon_probe
      - scripted_exploit
      - ai_probe
  action_space:
    type: multidiscrete
    dimensions: [4, 4, 3]
    meaning:
      profile_index: 4
      temporal_profile: 4
      port_config: 3
    total_joint_actions: 48
  observation_space:
    type: box
    shape: [12]
    components:
      - profile_index_norm
      - temporal_index_norm
      - ssh_enabled
      - http_enabled
      - redis_enabled
      - last_suspicion
      - last_depth_norm
      - session_count_norm
      - consecutive_detections_norm
      - attacker_onehot_nmap
      - attacker_onehot_scripted
      - attacker_onehot_ai_probe

environment:
  file: env/honeypot_env.py
  framework: gymnasium
  max_sessions_per_episode: 20
  terminate_on_consecutive_detections: 5
  services:
    - ssh
    - http
    - redis
  training_ports:
    ssh: 12222
    http: 18080
    redis: 16379
  evaluation_ports:
    ssh: 2222
    http: 8080
    redis: 6379
  defender_controls:
    - identity_profile
    - temporal_response_profile
    - exposed_port_configuration

attackers:
  base_contract: attackers/base_attacker.py
  tiers:
    - name: recon_probe
      level: 1
      file: attackers/level1_nmap.py
      category: reconnaissance
    - name: scripted_exploit
      level: 2
      file: attackers/level2_scripted.py
      category: scripted_multiservice_attacker
    - name: ai_probe
      level: 3
      file: attackers/level3_bandit.py
      category: bandit_style_adaptive_probe_learner
  level3_details:
    probe_actions:
      - ssh_banner
      - ssh_creds
      - http_root
      - http_traversal
      - redis_ping
      - redis_info
      - latency_probe
      - consistency_probe
    policy:
      type: epsilon_greedy_bandit
    early_stop_on_suspicion: true

training:
  file: train.py
  episodes: 1500
  gamma: 0.99
  gae_lambda: 0.85
  learning_rate: 0.0003
  value_loss_coeff: 0.5
  grad_clip: 0.5
  seed: 42
  entropy_coeff_per_attacker:
    recon_probe: 0.014
    scripted_exploit: 0.005
    ai_probe: 0.003
  curriculum:
    phase1_end: 0.30
    phase2_end: 0.60
    phases:
      - name: phase1
        attackers: [recon_probe]
      - name: phase2
        attackers: [recon_probe, scripted_exploit]
      - name: phase3
        attackers: [recon_probe, scripted_exploit, ai_probe]
  optimizer_groups:
    - trunk_lr_scale: 0.5
    - policy_heads_lr_scale: 1.0
    - value_heads_lr_scale: 0.25

reward:
  components:
    - low_suspicion
    - interaction_depth
    - session_duration
    - attacker_specific_evasion_bonus
    - detection_penalty
  normalization: attacker_specific_history_aware

deferred_steps:
  step3:
    - evaluation_framework
    - baselines
    - metrics
    - reports
  step4:
    - sqlite_memory
    - stix_2_1_export
  step5:
    - ollama_phi3_eval_layer
    - llm_realism
  step6:
    - dashboard
    - packaging
    - productization